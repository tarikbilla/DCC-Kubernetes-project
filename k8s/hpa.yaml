# ---------------------------------------------------------------------------
# HorizontalPodAutoscaler (HPA) — BONUS demo: automatic scaling.
#
# Manual scaling is `kubectl scale --replicas=N`. The HPA does it for you:
# it watches average CPU usage (measured by metrics-server against each
# Pod's resources.requests.cpu) and adjusts `replicas` between min and max.
#
# Requires metrics-server to be installed in the cluster — see README.
# ---------------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dcc-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dcc-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # target: 50% of each Pod's CPU request
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0    # react immediately (good for a demo)
    scaleDown:
      stabilizationWindowSeconds: 60   # wait 1 min before scaling back down
