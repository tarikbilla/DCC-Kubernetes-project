# ---------------------------------------------------------------------------
# Service — a stable network entry point in front of the Pods.
#
# Pods are ephemeral: they die, get replaced, and every replacement has a new
# IP. A Service gives one fixed virtual IP + DNS name and load-balances
# incoming traffic across all Pods whose labels match its selector.
#
# Type NodePort opens the same port on every cluster node. Our kind cluster
# maps node port 30080 to localhost:8080 (see kind-config.yaml), so the app
# is reachable at http://localhost:8080.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dcc-web
  labels:
    app: dcc-web
spec:
  type: NodePort
  selector:
    app: dcc-web          # every Pod with this label becomes a backend
  ports:
    - name: http
      port: 80            # the Service's own port (inside the cluster)
      targetPort: 8000    # the containerPort the app listens on
      nodePort: 30080     # opened on every node (valid range 30000-32767)
